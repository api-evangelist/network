contactProperties:
  description: Properties used inside contact and maintainer entries.
  properties:
    - name: FN
      description: Full name of the contact person or organization.
    - name: name
      description: Name of the contact person or organization.
    - name: email
      description: Email address for the contact.
    - name: url
      description: Website or profile URL for the contact.
    - name: type
      description: Type of contact role (e.g. Support).
